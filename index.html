<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow Assistant</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTAINER */
.container{
  width:380px;
  height:650px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* HEADER */
.header{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  gap:10px;
}

.header img{
  width:35px;
  border-radius:50%;
}

.header button{
  margin-left:auto;
  background:#3b82f6;
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.card{
  text-align:center;
  font-size:12px;
}

.card b{
  font-size:18px;
  display:block;
}

/* CHAT */
.chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg{
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  max-width:75%;
  animation: fadeUp 0.3s ease;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.bot{
  background:rgba(255,255,255,0.1);
}

/* INPUT */
.input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

.input input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:transparent;
  color:white;
}

.input button{
  padding:10px;
  background:#10b981;
  border:none;
  color:white;
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="assets/avatar.png">
    <div>
      <b>AI Assistant</b><br>
      <small style="color:gray;">Online</small>
    </div>
    <button onclick="loadTasks()">View</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div class="card">
      <b id="total">0</b>
      Total
    </div>
    <div class="card">
      <b id="today">0</b>
      Today
    </div>
    <div class="card">
      <b id="last">-</b>
      Last Task
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <!-- INPUT -->
  <div class="input">
    <input id="text" placeholder="Type task...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

// ENTER KEY
document.getElementById("text").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    send();
  }
});

// SEND TASK
function send(){
  let input = document.getElementById("text");
  let value = input.value;

  if(!value.trim()) return;

  addMsg(value,"user");
  input.value="";

  let typing = addMsg("Typing...", "bot");

  fetch("https://hook.eu1.make.com/665d37s54c5xuojtb8dtlijd8yqy5foy", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    task: value.trim()
  })
})
.then(res => res.text())
.then(() => {
  typing.remove();
  addMsg("Task saved ✅","bot");
})
.catch(() => {
  typing.remove();
  addMsg("❌ Failed to save","bot");
});
}

// LOAD TASKS + DASHBOARD
function loadTasks(){

  addMsg("📊 Loading dashboard...", "bot");

  fetch("https://hook.eu1.make.com/665d37s54c5xuojtb8dtlijd8yqy5foy")
  .then(res => res.json())
  .then(data => {

    if(!data || data.length === 0){
      addMsg("No tasks found","bot");
      return;
    }

    // TOTAL
    document.getElementById("total").innerText = data.length;

    // TODAY COUNT
    let today = new Date().toLocaleDateString("en-GB");
    let todayCount = data.filter(d => d.Time.includes(today)).length;
    document.getElementById("today").innerText = todayCount;

    // LAST TASK
    let lastTask = data[data.length-1];
    document.getElementById("last").innerText = lastTask.Task;

    // SHOW LAST 5 TASKS
    data.slice(-5).forEach(row => {
      addMsg("📝 " + row.Task + " (" + row.Time + ")", "bot");
    });

  })
  .catch(()=>{
    addMsg("⚠️ Failed to load data","bot");
  });
}

// ADD MESSAGE
function addMsg(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  let chat = document.getElementById("chat");
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

  return div;
}

</script>

</body>
</html>
