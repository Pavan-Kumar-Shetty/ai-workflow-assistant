<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow Assistant</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTAINER */
.container{
  width:360px;
  height:600px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* HEADER */
.header{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  gap:10px;
}

.header img{
  width:35px;
  border-radius:50%;
}

/* CHAT */
.chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

/* MESSAGE */
.msg{
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  max-width:70%;
  animation: fadeUp 0.3s ease;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.bot{
  background:rgba(255,255,255,0.1);
}

/* INPUT */
.input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

.input input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:transparent;
  color:white;
}

.input button{
  padding:10px;
  background:#10b981;
  border:none;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.input button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #10b981;
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="assets/avatar.png">
    <div>
      <b>AI Workflow Assistant</b><br>
      <small style="color:gray;">Online</small>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <!-- INPUT -->
  <div class="input">
    <input id="text" placeholder="Type task...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

// ENTER KEY SUPPORT
document.getElementById("text").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    send();
  }
});

// SEND FUNCTION
function send(){
  let input = document.getElementById("text");
  let value = input.value;

  if(!value.trim()) return;

  addMsg(value,"user");
  input.value="";

  let typing = addMsg("Typing...", "bot");

  fetch("https://hook.eu1.make.com/665d37s54c5xuojtb8dtlijd8yqy5foy", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({task:value})
  })
  .catch(()=>{
    addMsg("⚠️ Failed to save task","bot");
  });

  setTimeout(()=>{
    typing.remove();

    let reply = "Task saved to system ✅";

    if(value.toLowerCase().includes("today")){
      reply = "📅 Showing today's tasks soon...";
    }
    else if(value.toLowerCase().includes("done")){
      reply = "✅ Task marked as completed (simulated)";
    }

    addMsg(reply,"bot");

  },800);
}

// ADD MESSAGE
function addMsg(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  let chat = document.getElementById("chat");
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

  return div;
}

</script>

</body>
</html>
